<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuna Loader - Mod Manager</title>
    <style>
        body {
            background-color: #141418;
            color: #e6e6f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #1e1e24;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #ffffff;
            margin-bottom: 5px;
        }
        .version {
            color: #8c8ca0;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .btn-download {
            display: inline-block;
            background-color: #00a550;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            transition: background 0.2s ease;
        }
        .btn-download:hover {
            background-color: #00c25e;
        }
        .instructions {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #a0a0b0;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1> Tuna Loader</h1>
        <div class="version">1.2 Installer</div>
        
        <a href="https://raw.githubusercontent.com/USERNAME/REPO/main/TunaLoader.exe" class="btn-download">
            Download for Windows
        </a>

        <div class="instructions">
            <strong>Installation:</strong> Place TunaLoader.exe inside your main game folder alongside FISH.exe and run it!
        </div>
    </div>

</body>
</html>
